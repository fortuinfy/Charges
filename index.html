<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brokerage Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Brokerage Calculator</h1>
  </header>
  
  <main class="container">
    <section class="input-section">
      <h2>Enter Trade Details</h2>
      <form id="brokerage-form">
        <!-- Your existing form fields here -->
        <!-- Example -->
        <label>Broker: <input type="text" id="broker" required></label>
        <label>Trade Type:
          <select id="tradeType">
            <option value="intraday">Intraday</option>
            <option value="delivery">Delivery</option>
          </select>
        </label>
        <label>Buy Price: <input type="number" id="buyPrice" /></label>
        <label>Sell Price: <input type="number" id="sellPrice" /></label>
        <label>Quantity: <input type="number" id="quantity" required /></label>
        <button type="submit">Calculate</button>
      </form>
    </section>

    <section class="result-section">
      <h2>Calculation Results</h2>
      <div id="results">
        <!-- Results will be injected here -->
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
